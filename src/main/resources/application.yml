server:
  port: 8080

spring:
  application:
    name: seckill-system

  datasource:
    url: jdbc:mysql://192.168.64.2:3306/seckill?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      # ========== 单机模式（开发/测试） ==========
      host: 192.168.64.2
      port: 6379
      timeout: 3000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms
      # ========== Sentinel 模式（生产环境） ==========
      # 切换时注释掉上方 host/port，启用下方配置：
      # sentinel:
      #   master: seckill-master
      #   nodes:
      #     - 192.168.64.2:26379
      #     - 192.168.64.3:26379
      #     - 192.168.64.4:26379
      #   password: 123456
      #   timeout: 3000

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: update

  jackson:
    time-zone: Asia/Shanghai

logging:
  level:
    root: info