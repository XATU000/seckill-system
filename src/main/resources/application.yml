server:
  port: 8080

spring:
  application:
    name: seckill-system

  datasource:
    url: jdbc:mysql://127.0.0.1:3307/seckill?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
    username: seckill
    password: seckill123
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      # ========== Sentinel 模式（高可用） ==========
      sentinel:
        master: seckill-master
        nodes:
          - 127.0.0.1:26379
          - 127.0.0.1:26380
          - 127.0.0.1:26381
        timeout: 3000
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: update

  jackson:
    time-zone: Asia/Shanghai

logging:
  level:
    root: info