spring:
  datasource:
    url: jdbc:mysql://mysql:3306/seckill?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
    username: seckill
    password: seckill123

  data:
