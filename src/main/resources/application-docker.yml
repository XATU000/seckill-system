spring:
  datasource:
    url: jdbc:mysql://mysql:3306/seckill?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
    username: seckill
    password: seckill123

  data:
    redis:
      sentinel:
        master: seckill-master
        nodes:
          - sentinel-1:26379
          - sentinel-2:26379
          - sentinel-3:26379
        timeout: 3000
      lettuce:
        pool:
          max-active: 100
          max-idle: 30
          min-idle: 10
          max-wait: 3000ms

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
