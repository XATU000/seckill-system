# Redis 持久化配置 (生产环境)
# 适用于 Redis 7.0+

# ── RDB 快照 ──────────────────────────────
# 格式: save <seconds> <changes>
# 秒杀场景：秒杀期间变化密集，10s/1000 次触发频繁快照，保证快速恢复
save 900 1
save 60 100
save 10 1000

# RDB 文件
dbfilename dump.rdb
dir /data

# 快照失败时拒绝写入（防止 RDB 损坏时继续写入导致数据不一致）
stop-writes-on-bgsave-error yes
# 压缩 RDB（CPU 换磁盘空间）
rdbcompression yes
# 写入前校验 CRC64，加载时检查
rdbchecksum yes

# ── AOF 日志 ──────────────────────────────
appendonly yes
appendfilename "appendonly.aof"

# fsync 策略: everysec = 性能与持久性最佳平衡，最坏丢失 1 秒数据
appendfsync everysec

# AOF 自动重写（文件增长 100% 且 >= 64MB 时触发）
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 重写期间不 fsync 旧文件（交给 OS 缓冲），避免磁盘 IO 争抢
no-appendfsync-on-rewrite yes

# ── 混合持久化 (Redis 7+ 推荐) ────────────
# AOF 重写时，前半部分用 RDB 格式（加载快），后半部分用 AOF 增量（数据全）
# 兼顾 RDB 的快速重启 + AOF 的低数据丢失
aof-use-rdb-preamble yes

# AOF 时间戳 (Redis 7+)：支持按时间点恢复
aof-timestamp-enabled yes

# ── 数据恢复优先级 ─────────────────────────
# AOF + RDB 同时存在时，优先加载 AOF（混合格式先解 RDB 再重放增量）