# Redis 持久化配置 (生产环境)
# 适用于 Redis 7.0+

# ── RDB 快照 ──────────────────────────────
# 格式: save <seconds> <changes>
# 秒杀场景数据变化快，提高快照频率
save 900 1
save 60 100
save 10 1000

# RDB 文件
dbfilename dump.rdb
dir /data

# 快照失败时拒绝写入（防止损坏时覆盖）
stop-writes-on-bgsave-error yes
# 压缩 RDB 文件
rdbcompression yes

# ── AOF 日志 ──────────────────────────────
appendonly yes
appendfilename "appendonly.aof"

# fsync 策略: everysec 每秒刷盘一次
# 性能与持久性最佳平衡，最坏丢失 1 秒数据
appendfsync everysec

# AOF 自动重写（当文件增长 100% 且超过 64MB 时触发）
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 重写时不同步旧文件，避免阻塞
no-appendfsync-on-rewrite yes

# ── 数据恢复优先级 ─────────────────────────
# 重启时优先使用 AOF（记录更完整）
# AOF 和 RDB 同时开启时，Redis 自动优先加载 AOF