# Redis Sentinel 配置文件
# 适用于 3 节点哨兵集群，quorum = 2

# 哨兵端口
port 26379

# 监控主节点
# sentinel monitor <master-name> <ip> <port> <quorum>
# quorum=2: 至少 2 个哨兵同意才触发故障转移
sentinel monitor seckill-master redis-master 6379 2

# 主观下线判定超时 (毫秒)
sentinel down-after-milliseconds seckill-master 5000

# 故障转移超时 (毫秒)
sentinel failover-timeout seckill-master 10000

# 故障转移时同时向新主同步的从节点数 (1 个即可，避免同步压力)
sentinel parallel-syncs seckill-master 1
