<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>压测监控面板</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 30px; }
  h1 { text-align: center; margin-bottom: 8px; font-size: 24px; }
  .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 30px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; max-width: 900px; margin: 0 auto 30px; }
  .card { background: #16213e; border-radius: 12px; padding: 24px; text-align: center; border: 1px solid #0f3460; }
  .card .label { font-size: 13px; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .card .value { font-size: 42px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .card .value.green { color: #2ecc71; }
  .card .value.red { color: #e74c3c; }
  .card .value.blue { color: #3498db; }
  .card .value.yellow { color: #f1c40f; }

  .chart-container { max-width: 900px; margin: 0 auto 30px; background: #16213e; border-radius: 12px; padding: 24px; border: 1px solid #0f3460; }
  .chart-container h3 { margin-bottom: 16px; font-size: 14px; color: #888; }
  .bar-wrap { margin-bottom: 12px; }
  .bar-wrap .bar-label { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13px; }
  .bar-wrap .bar-label span:last-child { color: #888; }
  .bar-track { height: 28px; background: #0f3460; border-radius: 6px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 6px; transition: width 0.3s; }
  .bar-fill.sold { background: linear-gradient(90deg, #e74c3c, #c0392b); }
  .bar-fill.remain { background: linear-gradient(90deg, #2ecc71, #27ae60); }
  .bar-fill.rate { background: linear-gradient(90deg, #3498db, #2980b9); }

  .log-box { max-width: 900px; margin: 0 auto; background: #0d1117; border-radius: 12px; padding: 20px; border: 1px solid #30363d; font-family: 'SF Mono', monospace; font-size: 13px; height: 300px; overflow-y: auto; white-space: pre-wrap; color: #8b949e; }

  .controls { max-width: 900px; margin: 0 auto 20px; display: flex; gap: 12px; align-items: center; }
  .controls input { width: 80px; padding: 8px 12px; border: 1px solid #0f3460; border-radius: 6px; background: #16213e; color: #eee; font-size: 14px; text-align: center; }
  .controls label { font-size: 13px; color: #888; }
  .btn { padding: 10px 24px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .btn-start { background: #e74c3c; color: #fff; }
  .btn-start:disabled { background: #555; cursor: not-allowed; }
  .btn-reset { background: #2c3e50; color: #ccc; }
  .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .status-badge.idle { background: #2c3e50; color: #888; }
  .status-badge.running { background: #e74c3c22; color: #e74c3c; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
</style>
</head>
<body>
<h1>秒杀压测监控面板</h1>
<div class="subtitle">实时监控 Redis 库存 & 请求状态</div>

<div class="controls">
  <label>并发数</label>
  <input type="number" id="threads" value="300" min="10" max="5000">
  <label>压测时长(s)</label>
  <input type="number" id="duration" value="5" min="1" max="60">
  <button class="btn btn-start" id="startBtn" onclick="startTest()">启动压测</button>
  <button class="btn btn-reset" onclick="resetView()">重置</button>
  <span class="status-badge idle" id="statusBadge">待命中</span>
</div>

<div class="grid">
  <div class="card">
    <div class="label">剩余库存</div>
    <div class="value green" id="stockVal">--</div>
  </div>
  <div class="card">
    <div class="label">已售出</div>
    <div class="value red" id="soldVal">--</div>
  </div>
  <div class="card">
    <div class="label">累计请求</div>
    <div class="value blue" id="reqVal">0</div>
  </div>
  <div class="card">
    <div class="label">QPS</div>
    <div class="value yellow" id="qpsVal">0</div>
  </div>
</div>

<div class="chart-container">
  <h3>库存消耗进度</h3>
  <div class="bar-wrap">
    <div class="bar-label"><span>已售出</span><span id="soldPct">0%</span></div>
    <div class="bar-track"><div class="bar-fill sold" id="soldBar" style="width:0%"></div></div>
  </div>
  <div class="bar-wrap">
    <div class="bar-label"><span>剩余库存</span><span id="remainPct">100%</span></div>
    <div class="bar-track"><div class="bar-fill remain" id="remainBar" style="width:100%"></div></div>
  </div>
</div>

<div class="chart-container">
  <h3>QPS 实时曲线</h3>
  <div class="bar-wrap">
    <div class="bar-label"><span>当前 QPS / 限流阈值 5000</span><span id="qpsRatio">0%</span></div>
    <div class="bar-track"><div class="bar-fill rate" id="qpsBar" style="width:0%"></div></div>
  </div>
</div>

<div class="log-box" id="logBox">
  等待启动压测...
</div>

<script>
const BASE = 'http://localhost:8080';
const POLL_MS = 150;

let monitorTimer = null;
let testRunning = false;
let startTime = 0;
let initialStock = 0;
let reqCount = 0;
let lastReqCount = 0;
let lastQpsTime = 0;
let logLines = [];

// ---- Init ----
fetchStock(true);

function fetchStock(isInit) {
  fetch(BASE + '/seckill/stock/1')
    .then(r => r.json())
    .then(d => {
      if (d.code === 1) {
        document.getElementById('stockVal').textContent = d.data;
        if (isInit) initialStock = d.data;
      }
    }).catch(() => {});
}

// ---- Start Test ----
async function startTest() {
  if (testRunning) return;
  testRunning = true;

  const threads = parseInt(document.getElementById('threads').value) || 300;
  const duration = parseInt(document.getElementById('duration').value) || 5;

  document.getElementById('startBtn').disabled = true;
  setStatus('running', '压测中...');

  // Reset counters
  reqCount = 0;
  lastReqCount = 0;
  lastQpsTime = Date.now();
  logLines = [];
  addLog(`[启动] 并发=${threads} 时长=${duration}s`);

  // Start monitoring
  startTime = Date.now();
  initialStock = parseInt(document.getElementById('stockVal').textContent) || 100;
  document.getElementById('soldVal').textContent = '0';
  document.getElementById('reqVal').textContent = '0';
  document.getElementById('qpsVal').textContent = '0';
  monitorTimer = setInterval(monitor, POLL_MS);

  // Simulate concurrent requests (fire-and-forget from browser)
  const endTime = Date.now() + duration * 1000;
  const promises = [];
  for (let i = 0; i < threads; i++) {
    promises.push(runUser(i, endTime));
  }

  await Promise.allSettled(promises);

  // Test done
  clearInterval(monitorTimer);
  testRunning = false;
  document.getElementById('startBtn').disabled = false;
  setStatus('idle', '待命中');
  addLog(`[完成] 总请求=${reqCount} 最终库存=${document.getElementById('stockVal').textContent}`);
}

async function runUser(userIdx, endTime) {
  const userId = 'stress_' + userIdx + '_' + Date.now();
  while (Date.now() < endTime) {
    try {
      await fetch(BASE + '/seckill/do/1?userId=' + encodeURIComponent(userId), { method: 'POST' });
      reqCount++;
    } catch(e) {
      // ignore network errors
    }
    // small random delay to stagger requests
    await new Promise(r => setTimeout(r, Math.random() * 50));
  }
}

// ---- Monitor ----
function monitor() {
  const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

  fetch(BASE + '/seckill/stock/1')
    .then(r => r.json())
    .then(d => {
      if (d.code !== 1) return;
      const stock = d.data;
      const sold = initialStock - stock;
      const soldPct = Math.min(100, (sold / initialStock * 100)).toFixed(0);
      const remainPct = Math.max(0, (stock / initialStock * 100)).toFixed(0);

      document.getElementById('stockVal').textContent = stock;
      document.getElementById('soldVal').textContent = sold;
      document.getElementById('reqVal').textContent = reqCount;
      document.getElementById('soldPct').textContent = soldPct + '%';
      document.getElementById('remainPct').textContent = remainPct + '%';
      document.getElementById('soldBar').style.width = soldPct + '%';
      document.getElementById('remainBar').style.width = remainPct + '%';

      // QPS calculation
      const now = Date.now();
      const elapsedQps = (now - lastQpsTime) / 1000;
      if (elapsedQps >= 0.5) {
        const qps = Math.round((reqCount - lastReqCount) / elapsedQps);
        document.getElementById('qpsVal').textContent = qps;
        document.getElementById('qpsBar').style.width = Math.min(100, (qps / 5000 * 100)).toFixed(0) + '%';
        document.getElementById('qpsRatio').textContent = Math.min(100, (qps / 5000 * 100)).toFixed(0) + '%';
        lastReqCount = reqCount;
        lastQpsTime = now;
      }

      if (stock <= 0 && sold >= initialStock) {
        addLog(`[售罄] 耗时 ${elapsed}s | 请求 ${reqCount} | 库存 ${stock}`);
      }
    }).catch(() => {});
}

// ---- Helpers ----
function addLog(msg) {
  const time = new Date().toLocaleTimeString();
  logLines.push(`[${time}] ${msg}`);
  if (logLines.length > 100) logLines.shift();
  document.getElementById('logBox').textContent = logLines.join('\n');
  document.getElementById('logBox').scrollTop = document.getElementById('logBox').scrollHeight;
}

function setStatus(state, text) {
  const badge = document.getElementById('statusBadge');
  badge.textContent = text;
  badge.className = 'status-badge ' + state;
}

function resetView() {
  if (monitorTimer) clearInterval(monitorTimer);
  testRunning = false;
  document.getElementById('startBtn').disabled = false;
  setStatus('idle', '待命中');
  reqCount = 0;
  fetchStock(true);
  document.getElementById('soldVal').textContent = '--';
  document.getElementById('reqVal').textContent = '0';
  document.getElementById('qpsVal').textContent = '0';
  document.getElementById('soldBar').style.width = '0%';
  document.getElementById('remainBar').style.width = '100%';
  document.getElementById('qpsBar').style.width = '0%';
  logLines = [];
  document.getElementById('logBox').textContent = '等待启动压测...';
}
</script>
</body>
</html>
